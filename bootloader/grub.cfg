set timeout=5
set default=0

# AVIOS Boot Menu Theme
set color_normal=cyan/black
set color_highlight=black/cyan

menuentry "AVIOS - Advanced Virtualized Intelligence OS" {
    set gfxpayload=keep
    linux /boot/vmlinuz-avios root=LABEL=AVIOS_ROOT quiet splash vga=791
    initrd /boot/initrd.img-avios
}

menuentry "AVIOS - Safe Mode" {
    set gfxpayload=keep
    linux /boot/vmlinuz-avios root=LABEL=AVIOS_ROOT single
    initrd /boot/initrd.img-avios
}

menuentry "AVIOS - Recovery Mode" {
    set gfxpayload=keep
    linux /boot/vmlinuz-avios root=LABEL=AVIOS_ROOT ro recovery nomodeset
    initrd /boot/initrd.img-avios
}

menuentry "Memory Test (memtest86+)" {
    linux16 /boot/memtest86+.bin
}
